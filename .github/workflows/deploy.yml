port: ${{ secrets.SERVER_PORT }}
username: ${{ secrets.SERVER_USER }}
key: ${{ secrets.SERVER_SSH_KEY }}
script: |
  cd /var/www/job1 #เปลี่ยน Path ตรงนี้ให้ถูกต้อง
  git fetch origin
  git reset --hard origin/main

name: PHP Deploy Pipeline
on:
push:
branches: [ "main" ]

jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: �� Remote SSH to Execution Commands
uses: appleboy/ssh-action@v1.2.0
with:
